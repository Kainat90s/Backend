<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }}</title>
  </head>
  <body style="margin:0; padding:0; background:#0f172a; color:#e2e8f0; font-family:Arial, sans-serif;">
    <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a; padding:24px 0;">
      <tr>
        <td align="center">
          <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background:#0b1220; border:1px solid #1e293b; border-radius:16px; padding:24px;">
            <tr>
              <td style="padding-bottom:12px;">
                <div style="display:inline-block; padding:6px 12px; background:#1e293b; color:#93c5fd; border-radius:999px; font-size:12px; letter-spacing:1px; text-transform:uppercase;">
                  ByteSlot
                </div>
              </td>
            </tr>
            <tr>
              <td>
                <h1 style="margin:8px 0 4px; font-size:22px; color:#e2e8f0;">{{ title }}</h1>
                <p style="margin:0 0 16px; color:#94a3b8; font-size:14px;">Hi {{ recipient_name }},</p>
                <p style="margin:0 0 20px; color:#cbd5f5; font-size:14px; line-height:1.6;">{{ intro }}</p>
              </td>
            </tr>
            <tr>
              <td>
                <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#0f172a; border:1px solid #1e293b; border-radius:12px; padding:16px;">
                  <tr>
                    <td style="padding:6px 0; color:#94a3b8; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Date</td>
                    <td style="padding:6px 0; color:#e2e8f0; font-size:14px; text-align:right;">{{ date }}</td>
                  </tr>
                  <tr>
                    <td style="padding:6px 0; color:#94a3b8; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Time</td>
                    <td style="padding:6px 0; color:#e2e8f0; font-size:14px; text-align:right;">{{ time }}</td>
                  </tr>
                  <tr>
                    <td style="padding:6px 0; color:#94a3b8; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Type</td>
                    <td style="padding:6px 0; color:#e2e8f0; font-size:14px; text-align:right;">{{ meeting_type }}</td>
                  </tr>
                  <tr>
                    <td style="padding:6px 0; color:#94a3b8; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Notes</td>
                    <td style="padding:6px 0; color:#e2e8f0; font-size:14px; text-align:right;">{{ notes }}</td>
                  </tr>
                  {% if meet_link %}
                  <tr>
                    <td style="padding:6px 0; color:#94a3b8; font-size:12px; text-transform:uppercase; letter-spacing:1px;">Meet Link</td>
                    <td style="padding:6px 0; text-align:right;">
                      <a href="{{ meet_link }}" style="color:#60a5fa; text-decoration:none; font-size:14px;">Join Meeting</a>
                    </td>
                  </tr>
                  {% endif %}
                </table>
              </td>
            </tr>
            {% if cta_url %}
            <tr>
              <td style="padding-top:20px;">
                <a href="{{ cta_url }}" style="display:inline-block; background:#4f46e5; color:#ffffff; text-decoration:none; padding:10px 18px; border-radius:10px; font-size:14px;">
                  {{ cta_label }}
                </a>
              </td>
            </tr>
            {% endif %}
          </table>
          <p style="color:#64748b; font-size:12px; margin-top:16px;">
            Powered by ByteSlot - Scheduling made simple. © {{ year }}
          </p>
        </td>
      </tr>
    </table>
  </body>
</html>
